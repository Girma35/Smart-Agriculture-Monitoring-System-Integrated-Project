services:
  - type: web_service
    name: smart-agriculture-api
    env: node
    plan: free
    branch: main
    rootDir: apps/api
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      # Note: Add the following environment variables in the Render Dashboard
      # - ROBOFLOW_API_KEY
      # - ROBOFLOW_MODEL_ID
      # - CORS_ORIGIN
    autoDeploy: true
